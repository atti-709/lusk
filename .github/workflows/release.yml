name: Release

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm install

      - name: Install electron-builder globally
        run: npm install -g electron-builder

      - name: Bump version
        run: npm version patch -w electron

      - name: Build all workspaces including Electron
        run: npm run build:electron

      - name: Bundle and publish
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run bundle && electron-builder --publish always

      - name: Push version and tag
        run: git push --follow-tags
