name: Release

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm install

      - name: Ensure app-builder binary
        run: |
          BINARY="node_modules/app-builder-bin/mac/app-builder_$(uname -m)"
          if [ ! -f "$BINARY" ]; then
            echo "Binary missing at $BINARY, reinstalling..."
            npm pack app-builder-bin --pack-destination /tmp
            tar -xzf /tmp/app-builder-bin-*.tgz -C /tmp
            cp /tmp/package/mac/* node_modules/app-builder-bin/mac/
          fi
          chmod +x node_modules/app-builder-bin/mac/app-builder_*
          ls -la node_modules/app-builder-bin/mac/

      - name: Bump version
        run: npm version patch -w electron

      - name: Build all workspaces including Electron
        run: npm run build:electron

      - name: Bundle and publish
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run bundle && npx electron-builder --publish always

      - name: Push version and tag
        run: git push --follow-tags
