name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compute next version
        id: version
        run: |
          BUMP=${{ github.event.inputs.bump || 'patch' }}
          LATEST=$(git tag --sort=-v:refname | grep '^v' | head -1 | sed 's/^v//')
          if [ -z "$LATEST" ]; then LATEST="0.0.0"; fi
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          VERSION="$MAJOR.$MINOR.$PATCH"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Next version: $VERSION"

      - name: Set version in package.json
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('electron/package.json', 'utf8'));
            pkg.version = '${{ steps.version.outputs.version }}';
            fs.writeFileSync('electron/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Install dependencies
        run: npm install

      - name: Install electron-builder globally
        run: npm install -g electron-builder

      - name: Build all workspaces including Electron
        run: npm run build:electron

      - name: Bundle and build (unsigned)
        working-directory: electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run bundle && electron-builder --publish never

      - name: Sign app with stable designated requirement
        run: |
          APP="electron/out/mac-arm64/Lusk.app"

          # Sign from inside out (Electron requires this order)
          # 1. All dylibs
          find "$APP" -name "*.dylib" -exec codesign --force --sign - {} \;
          # 2. Helper apps
          find "$APP/Contents/Frameworks" -name "*.app" -exec codesign --force --sign - {} \;
          # 3. All frameworks
          find "$APP/Contents/Frameworks" -name "*.framework" -exec codesign --force --sign - {} \;
          # 4. Outer app with custom designated requirement
          codesign --force --sign - \
            --requirements '=designated => identifier "com.lusk.app"' \
            "$APP"

          # Verify
          codesign --verify --deep --strict "$APP" && echo "Signature OK"

      - name: Repackage and publish
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -f out/*.dmg out/*.zip
          electron-builder --publish always --prepackaged out/mac-arm64/Lusk.app

      - name: Tag and push
        run: |
          VERSION="v${{ steps.version.outputs.version }}"
          git tag "$VERSION"
          git push origin "$VERSION"
